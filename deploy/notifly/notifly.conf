# NotiFly branding proxy — fronts the Novu dashboard and rewrites it to NotiFly.
# Non-destructive: the dashboard image is untouched; we only rewrite the served HTML
# and swap the logo image files at their exact paths.
server {
  listen 80;
  server_name _;

  # NotiFly brand assets (served locally, before the proxy). no-store so re-skins apply instantly.
  location = /notifly-brand.js    { root /notifly; default_type application/javascript; add_header Cache-Control "no-store" always; }
  location = /notifly-logo.svg    { root /notifly; default_type image/svg+xml; add_header Cache-Control "no-store" always; }
  location = /notifly-favicon.svg { root /notifly; default_type image/svg+xml; add_header Cache-Control "no-store" always; }

  # Swap Novu's logo images at the network layer (bulletproof — no DOM hacks needed).
  # Wordmark slots (~3.2:1):
  location = /images/novu-logo-dark.svg    { alias /notifly/notifly-wordmark.svg; default_type image/svg+xml; add_header Cache-Control "no-store" always; }
  location = /images/novu-logo-color.svg   { alias /notifly/notifly-wordmark.svg; default_type image/svg+xml; add_header Cache-Control "no-store" always; }
  location = /images/auth/unified-logo.svg { alias /notifly/notifly-wordmark.svg; default_type image/svg+xml; add_header Cache-Control "no-store" always; }
  location = /images/novu-branding.png     { alias /notifly/notifly-wordmark.svg; default_type image/svg+xml; add_header Cache-Control "no-store" always; }
  # Square icon slots:
  location = /images/novu.svg              { alias /notifly/notifly-logo.svg; default_type image/svg+xml; add_header Cache-Control "no-store" always; }
  location = /images/novu.png              { alias /notifly/notifly-logo.svg; default_type image/svg+xml; add_header Cache-Control "no-store" always; }
  location = /favicon-gradient.svg         { alias /notifly/notifly-favicon.svg; default_type image/svg+xml; add_header Cache-Control "no-store" always; }

  # Content-hashed bundles — safe to cache hard, and must NOT be rewritten.
  location /assets/ {
    proxy_pass http://novu-dashboard:4000;
    proxy_set_header Host $host;
  }

  # Everything else = the SPA HTML. Rewrite it to NotiFly and never cache it,
  # so the branding + injected script always load fresh.
  location / {
    proxy_pass http://novu-dashboard:4000;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header Accept-Encoding "";      # disable upstream gzip so sub_filter can rewrite
    proxy_hide_header Cache-Control;
    add_header Cache-Control "no-store" always;

    sub_filter_once off;
    sub_filter_types text/html;
    sub_filter '<title>Novu Cloud Dashboard</title>' '<title>NotiFly</title>';
    sub_filter '/favicon-gradient.svg' '/notifly-favicon.svg';
    sub_filter '</head>' '<script src="/notifly-brand.js"></script></head>';
  }
}
