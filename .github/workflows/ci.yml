name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  web-build:
    name: hrms-web lint + build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: hrms-web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: hrms-web/package-lock.json
      - run: npm ci
      - run: npm run build
        env:
          # Build reads no real secrets; harmless placeholders keep it deterministic.
          NOVU_API_URL: http://localhost:3010
          NOVU_WS_URL: http://localhost:3011
          NOVU_API_KEY: ci-placeholder
          NOVU_APPLICATION_IDENTIFIER: ci-placeholder

  secret-scan:
    name: no committed secrets
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Fail if a real env file or key sneaks in
        run: |
          set -e
          if git ls-files | grep -E '(^|/)\.env$|\.env\.local$|/data/(db|subs)\.json$'; then
            echo "::error::A real env/data file is tracked"; exit 1
          fi
          echo "OK - only .env.example templates are tracked"
